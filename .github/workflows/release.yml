name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build and bundle
        run: cargo bundle --release

      - name: Ad-hoc code sign and repackage
        run: |
          APP="target/release/bundle/osx/ProxyBear.app"
          # Strip linker signature (does not cover bundle resources)
          codesign --remove-signature "$APP/Contents/MacOS/proxybear"
          # Re-sign entire bundle with ad-hoc identity
          codesign --force --deep --sign - "$APP"
          # Recreate DMG from re-signed .app
          rm -f target/release/bundle/dmg/ProxyBear.dmg
          mkdir -p /tmp/dmg_staging
          cp -R "$APP" /tmp/dmg_staging/
          hdiutil create -volname ProxyBear -srcfolder /tmp/dmg_staging -ov -format UDZO target/release/bundle/dmg/ProxyBear.dmg
          rm -rf /tmp/dmg_staging
          # Zip the re-signed .app
          cd target/release/bundle/osx
          zip -r ../ProxyBear.app.zip ProxyBear.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/ProxyBear.app.zip
            target/release/bundle/dmg/ProxyBear.dmg
          generate_release_notes: true
